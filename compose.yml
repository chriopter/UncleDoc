services:
  app:
    image: ghcr.io/chriopter/uncledoc:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    env_file:
      - .env.docker
    environment:
      RAILS_ENV: production
      FORCE_SSL: "false"
      ASSUME_SSL: "false"
      APP_PROTOCOL: http
      APP_HOST: localhost
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_POOL: "10"
      SOLID_QUEUE_IN_PUMA: "true"
      # Image tags:
      # - ghcr.io/chriopter/uncledoc:latest -> newest release
      # - ghcr.io/chriopter/uncledoc:edge -> newest push to main
      # MAILER_FROM: no-reply@localhost
      # APP_HOST: your.domain
      # APP_PROTOCOL: https
      # ALLOWED_HOSTS: your.domain
      # FORCE_SSL: "true"
      # ASSUME_SSL: "true"
    volumes:
      - uncledoc_storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  uncledoc_storage:
