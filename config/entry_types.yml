# Entry Type Definitions for UncleDoc
# Add new health tracking types here without code changes

entry_types:
  baby_feeding:
    icon: "baby-bottle"
    color: "emerald"
    label:
      en: "Feeding"
      de: "Fütterung"
    fields:
      method:
        type: select
        label:
          en: "Method"
          de: "Methode"
        options:
          - value: bottle
            label:
              en: "Bottle"
              de: "Flasche"
          - value: breast
            label:
              en: "Breast"
              de: "Brust"
          - value: solids
            label:
              en: "Solids"
              de: "Beikost"
          - value: mixed
            label:
              en: "Mixed"
              de: "Gemischt"
        required: false
      amount_ml:
        type: number
        label:
          en: "Amount (ml)"
          de: "Menge (ml)"
        min: 0
        max: 1000
        required: false
      duration_minutes:
        type: number
        label:
          en: "Duration (min)"
          de: "Dauer (min)"
        min: 0
        max: 120
        required: false

  baby_diaper:
    icon: "diaper"
    color: "blue"
    label:
      en: "Diaper"
      de: "Windel"
    fields:
      consistency:
        type: select
        label:
          en: "Consistency"
          de: "Konsistenz"
        options:
          - value: solid
            label:
              en: "Solid"
              de: "Fest"
          - value: fluid
            label:
              en: "Fluid"
              de: "Flüssig"
          - value: none
            label:
              en: "Wet only"
              de: "Nur nass"
          - value: both
            label:
              en: "Both"
              de: "Beides"
        required: true
      rash:
        type: boolean
        label:
          en: "Rash"
          de: "Ausschlag"
        required: false

  baby_sleep:
    icon: "moon"
    color: "indigo"
    label:
      en: "Sleep"
      de: "Schlaf"
    fields:
      duration_minutes:
        type: number
        label:
          en: "Duration (min)"
          de: "Dauer (min)"
        min: 0
        max: 720
        required: false
      quality:
        type: select
        label:
          en: "Quality"
          de: "Qualität"
        options:
          - value: good
            label:
              en: "Good"
              de: "Gut"
          - value: restless
            label:
              en: "Restless"
              de: "Unruhig"
          - value: interrupted
            label:
              en: "Interrupted"
              de: "Unterbrochen"
        required: false

  health_temperature:
    icon: "thermometer"
    color: "red"
    label:
      en: "Temperature"
      de: "Temperatur"
    fields:
      celsius:
        type: number
        label:
          en: "Temperature (°C)"
          de: "Temperatur (°C)"
        min: 35
        max: 42
        step: 0.1
        required: true
      location:
        type: select
        label:
          en: "Location"
          de: "Ort"
        options:
          - value: oral
            label:
              en: "Oral"
              de: "Mund"
          - value: ear
            label:
              en: "Ear"
              de: "Ohr"
          - value: forehead
            label:
              en: "Forehead"
              de: "Stirn"
          - value: armpit
            label:
              en: "Armpit"
              de: "Achsel"
        required: false

  health_pulse:
    icon: "heart"
    color: "rose"
    label:
      en: "Pulse"
      de: "Puls"
    fields:
      bpm:
        type: number
        label:
          en: "Heart rate (bpm)"
          de: "Herzfrequenz (bpm)"
        min: 30
        max: 250
        required: true
      activity:
        type: select
        label:
          en: "Activity"
          de: "Aktivität"
        options:
          - value: resting
            label:
              en: "Resting"
              de: "Ruhe"
          - value: active
            label:
              en: "Active"
              de: "Aktiv"
          - value: sleeping
            label:
              en: "Sleeping"
              de: "Schlafend"
        required: false

  note:
    icon: "note"
    color: "slate"
    label:
      en: "Note"
      de: "Notiz"
    fields: {}
