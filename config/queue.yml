default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: parse
      threads: <%= ENV.fetch("PARSE_THREADS", 4) %>
      processes: <%= ENV.fetch("PARSE_CONCURRENCY", 2) %>
      polling_interval: 0.05
    - queues: default
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
