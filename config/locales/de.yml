de:
  # Date/Time formats
  date:
    formats:
      long_date: "%d. %B %Y"
      compact_date: "%d.%m.%Y"
      long: "%d. %B %Y"
      compact: "%d.%m.%Y"
  
  time:
    formats:
      default: "%H:%M"
  
  # App name
  app:
    name: "UncleDoc"
    tagline: "Familien-Gesundheitstracker"

  # Navigation
  nav:
    home: "Startseite"
    timeline: "Zeitlinie"
    reports: "Berichte"
    settings: "Einstellungen"
    log: "Protokoll"
    db: "DB"

  # Common actions
  actions:
    save: "Speichern"
    delete: "Löschen"
    remove: "Entfernen"
    add: "Hinzufügen"
    create: "Erstellen"
    cancel: "Abbrechen"
    edit: "Bearbeiten"
    close: "Schließen"
    back: "Zurück"

  # ActiveRecord attribute translations
  activerecord:
    attributes:
      person:
        name: "Name"
        birth_date: "Geburtsdatum"
      entry:
        occurred_at: "Wann es passiert ist"
        note: "Notiz"

  # Common labels
  labels:
    name: "Name"
    birth_date: "Geburtsdatum"
    date: "Datum"
    note: "Notiz"
    notes: "Notizen"
    created: "Erstellt"
    updated: "Aktualisiert"

  # Common messages
  messages:
    confirm_delete: "Sind Sie sicher, dass Sie dies löschen möchten?"
    success: "Erfolg!"
    error: "Ein Fehler ist aufgetreten."
    empty: "Hier ist noch nichts."

  # Dashboard / Log
  dashboard:
    welcome:
      title: "Willkommen"
      subtitle: "Wählen Sie ein Familienmitglied aus, um sein Protokoll anzuzeigen"
      description: "Verwenden Sie das Dropdown im Header, um jemanden auszuwählen, oder gehen Sie zu Einstellungen > Benutzer, um Familienmitglieder hinzuzufügen."
      cta: "Familienmitglieder hinzufügen"
    new_entry:
      label: "Neuer Eintrag"
      title: "Gesundheitsinfo für %{name} protokollieren"
      subtitle: "Erfassen Sie, wann etwas passiert ist und was Sie beobachtet haben."
    entries:
      label: "Protokoll"
      title: "Einträge für %{name}"
      count: "%{count} Eintrag"
      count_plural: "%{count} Einträge"
      empty: "Noch keine Einträge. Fügen Sie die erste Gesundheitsnotiz links hinzu."
    protocol:
      label: "Gesundheitsprotokoll"
      title: "Protokoll - %{name}"
      count: "%{count} Eintrag"
      count_plural: "%{count} Einträge"
      empty: "Protokoll ist leer"
      empty_subtitle: "Fügen Sie oben Ihren ersten Eintrag hinzu, um Gesundheitsereignisse zu dokumentieren."

  log_summary:
    label: "KI"
    title: "KI-Zusammenfassung"
    subtitle: "Senden Sie alle gespeicherten Einträge für %{name} an das konfigurierte Modell und sehen Sie die Antwort hier an."
    button: "Protokoll zusammenfassen"
    button_short: "KI-Zusammenfassung"
    states:
      idle: "Drücken Sie den Button, um das aktuelle Protokoll an das konfigurierte LLM zu senden."
      missing_model: "Wählen Sie zuerst in den Einstellungen ein LLM-Modell aus."
      missing_api_key: "Hinterlegen Sie zuerst in den Einstellungen einen API-Schlüssel."
      no_entries: "Es gibt noch keine Protokolleinträge zum Zusammenfassen."
      request_failed: "Die Zusammenfassung ist fehlgeschlagen. Prüfen Sie die LLM-Einstellungen und versuchen Sie es erneut."

  # Entries
  entries:
    form:
      placeholder: "Was ist heute passiert?"
      submit: "Eintrag hinzufügen"
      title: "Gesundheitsinfo für %{name} protokollieren"
    data_labels:
      temperature: "Temperatur"
      pulse: "Puls"
      weight: "Gewicht"
      bottle_feeding: "Flasche"
      breast_feeding: "Stillen"
      diaper: "Windel"
      sleep: "Schlaf"
      medication: "Medikament"
    data_values:
      wet: "nass"
      solid: "fest"
      rash: "Ausschlag"
      side_left: "links"
      side_right: "rechts"
    destroy_confirm: "Diesen Eintrag löschen?"
    flash:
      created: "Eintrag hinzugefügt."
      destroyed: "Eintrag gelöscht."
    parse_status:
      pending: "Notiz wird an das LLM gesendet..."
      failed: "LLM-Parsing fehlgeschlagen. Die Notiz bleibt erhalten und kann später erneut verarbeitet werden."
    raw_data:
      toggle: "Rohdaten anzeigen"

  # People / Users / Family
  people:
    new:
      label: "Neuer Benutzer"
      title: "Familienmitglied hinzufügen"
      subtitle: "Name und Geburtsdatum eingeben, um jemanden hinzuzufügen."
    list:
      label: "Aktuelle Benutzer"
      title: "Alle Familienmitglieder"
      count: "%{count} Benutzer"
      count_plural: "%{count} Benutzer"
      empty: "Noch keine Benutzer. Fügen Sie Ihr erstes Familienmitglied links hinzu."
    form:
      placeholder_name: "Mila"
      label_birth_date: "Geburtsdatum"
      submit: "Person speichern"
      error_message: "Bitte korrigieren Sie das Formular."
    person:
      birth_date_label: "Geburtsdatum:"
      created_ago: "Vor %{time} erstellt"
      delete_confirm: "%{name} löschen?"
      remove_confirm: "%{name} entfernen?"
    flash:
      created: "Person hinzugefügt."
      destroyed: "Person entfernt."
      updated: "Person aktualisiert."
      update_error: "Person konnte nicht aktualisiert werden."

  # Settings
  settings:
    title: "Arbeitsbereich-Einstellungen"
    subtitle: "Ein einfacher Admin-Bereich für Anzeigeoptionen und den Rohdatenbank-Browser."
    profile:
      title: "Profileinstellungen"
      subtitle: "UI"
    users:
      title: "Benutzer"
      subtitle: "Familie"
    db:
      title: "Vollständige DB-Ansicht"
      subtitle: "SQL"
    display:
      title: "Anzeigeeinstellungen"
      subtitle: "Halten Sie den ersten Admin-Bereich einfach: Wählen Sie Sprache und Datumsformat für Ihre aktuelle Ansicht."
    language:
      label: "Sprache"
      title: "App-Sprache wählen"
      english: "English"
      german: "Deutsch"
    date_format:
      label: "Datumsformat"
      title: "Datumsanzeige wählen"
      long: "Lang"
      compact: "Kompakt"
    llm:
      title: "LLM"
      subtitle: "Modelle"
      heading: "Sprachmodell-Einstellungen"
      description: "Konfigurieren Sie das Parser-Modell, das UncleDoc für die Umwandlung von Notizen in strukturierte Daten und für Zusammenfassungen nutzt."
      provider_label: "Anbieter"
      provider_title: "Modellanbieter"
      current: "Aktueller Anbieter: %{provider}"
      api_key_title: "API-Schlüssel"
      api_key_saved: "In UncleDoc gespeichert"
      api_key_missing: "Umgebungsvariable oder fehlt"
      api_key_placeholder: "API-Schlüssel einfügen"
      model_title: "Modell"
      model_placeholder: "Modell wählen"
      model_empty: "Keine Modelle geladen"
      credentials_hint: "UncleDoc greift auf `%{env_key}` zurück, wenn hier kein Schlüssel gespeichert ist."
      endpoint_hint: "API-Basis: %{endpoint}"
      save: "LLM-Einstellungen speichern"
      prompt_label: "Parser-Prompt"
      prompt_title: "Aktueller Prompt für strukturierte Daten"
      prompt_description: "Dies ist der genaue System-Prompt, den UncleDoc vor jeder Notiz-Analyse sendet."
      model_status:
        idle: "Wählen Sie Anbieter und Schlüssel, um verfügbare Modelle zu laden."
        loading: "Modelle werden geladen..."
        loaded: "%{count} Modelle geladen."
        empty: "Dieser Anbieter hat keine Modelle zurückgegeben."
        missing_key: "Fügen Sie vor dem Laden der Modelle einen API-Schlüssel hinzu."
        request_failed: "Die Modellabfrage ist fehlgeschlagen. Prüfen Sie die Einstellungen und versuchen Sie es erneut."
        unsupported: "%{provider} unterstützt derzeit keine automatische Modellabfrage."
      providers:
        openai:
          name: "OpenAI"
        fireworks:
          name: "Fireworks"
        anthropic:
          name: "Anthropic"
        gemini:
          name: "Gemini"
        openrouter:
          name: "OpenRouter"
        ollama:
          name: "Ollama"
        xai:
          name: "xAI"
        mistral:
          name: "Mistral"
        perplexity:
          name: "Perplexity"
        deepseek:
          name: "DeepSeek"
    flash:
      saved: "Einstellungen gespeichert."

  # DB view
  db:
    title: "Rohdatenbank-Ansicht"
    subtitle: "Admin"
    description: "Dieser Tab zeigt die aktuellen SQLite-Tabellen und bis zu 50 Zeilen pro Tabelle zur schnellen V1-Überprüfung."
    table:
      count: "%{count} Zeile"
      count_plural: "%{count} Zeilen"
      empty: "Noch keine Zeilen."

  # Family/Header
  family:
    default_name: "Familie"
    members_label: "UncleDoc"

  # Baby mode
  baby:
    quick_actions:
      title: "Baby-Schnellaktionen"
      subtitle: "Die Schnellbuttons schreiben strukturierte Daten direkt. Freitext darunter bleibt fur alles andere sichtbar."
    feeding:
      label: "Baby"
      title: "Fütterung"
      empty: "Noch keine Fütterungen eingetragen"
      start_side: "%{side} starten"
      sides:
        left: "Links"
        right: "Rechts"
      timer:
        stop: "Stoppen und speichern"
        running: "Timer läuft seit"
        started: "Still-Timer %{side} gestartet"
        stopped: "Fütterungs-Timer gestoppt und gespeichert"
        missing: "Es läuft kein Fütterungs-Timer"
        already_running: "Der Fütterungs-Timer läuft bereits"
        duration: "%{duration} Min"
        note: "Stillen %{side}, %{duration} Minuten"
    diaper:
      label: "Baby"
      title: "Windelwechsel"
      empty: "Noch keine Windelwechsel eingetragen"
      rash: "Ausschlag vorhanden"
      buttons:
        wet: "Nass"
        solid: "Fest"
        both: "Beides"
      notes:
        wet: "Windel: nass"
        solid: "Windel: fest"
        both: "Windel: nass und fest"
      saved: "Windeleintrag gespeichert"
    bottle:
      title: "Flasche"
      button: "Flasche speichern"
      note: "Flasche %{amount}ml"
      badge: "%{amount} ml"
      invalid_amount: "Geben Sie eine Flaschenmenge groesser als 0 ml ein"
      saved: "Flascheneintrag gespeichert"
    log:
      label: "Protokoll"
      title: "Protokoll für %{name}"
      count: "%{count} Ereignis"
      count_plural: "%{count} Ereignisse"
      empty: "Noch keine Baby-Ereignisse. Tragen Sie die erste Fütterung oder den ersten Windelwechsel ein."
    protocol:
      title: "Baby-Protokoll"
    last_feeding: "Letzte Fütterung"
    last_diaper: "Letzte Windel"
    types:
      feeding: "Fütterung"
      diaper: "Windel"
    badge: "Baby-Modus"
    notes:
      subtitle: "Speichern Sie zuerst die Freitext-Notiz. UncleDoc erzeugt daraus im Hintergrund strukturierte Badges."
    off: "Aus"
    toggle: "Baby-Modus umschalten"

  # Person overview page
  person:
    overview:
      family_member: "Familienmitglied"
      birth_date: "Geboren"
      years_old: "Jahre alt"
      birth_date_not_set: "Geburtsdatum nicht festgelegt"
      stats:
        entries: "Protokoll-Einträge"
        entries_subtitle: "Gesundheitsnotizen aufgezeichnet"
        member_since: "Mitglied seit"
        last_activity: "Letzte Aktivität"
        last_activity_short: "Letzte"
        no_entries: "Keine Einträge"
        start_logging: "Beginnen Sie mit dem Protokollieren"
        most_recent: "Letzter Eintrag"
      recent_activity: "Letzte Aktivität"
      latest_entries: "Neueste Einträge"
      view_log: "Protokoll anzeigen"
