en:
  # Accessibility
  accessibility:
    skip_to_content: "Skip to content"
  
  # Date/Time formats
  date:
    formats:
      long_date: "%B %d, %Y"
      compact_date: "%m/%d/%Y"
      long: "%B %d, %Y"
      compact: "%m/%d/%Y"
  
  time:
    compact:
      minutes_ago:
        one: "1m ago"
        other: "%{count}m ago"
      hours_ago:
        one: "1h ago"
        other: "%{count}h ago"
    formats:
      default: "%H:%M"
  
  # App name
  app:
    name: "UncleDoc"
    tagline: "Family health tracker"
    shell:
      settings_hint: "Keep people, parser, and language settings close at hand."
    revision:
      tooltip: "Last commit: %{subject} (%{sha})"

  # Navigation
  nav:
    home: "Home"
    overview: "Overview"
    trends: "Trends"
    baby: "Baby"
    files: "Files"
    timeline: "Timeline"
    reports: "Reports"
    settings: "Settings"
    calendar: "Calendar"
    back: "Back"
    log: "Log"
    research: "Research"
    data: "Data"
    db: "DB"
    sections:
      overview: "Overview"
      research: "Research"
      data: "Data"

  # Common actions
  actions:
    save: "Save"
    delete: "Delete"
    remove: "Remove"
    add: "Add"
    create: "Create"
    cancel: "Cancel"
    edit: "Edit"
    close: "Close"
    back: "Back"

  # ActiveRecord attribute translations
  activerecord:
    attributes:
      person:
        name: "Name"
        birth_date: "Birth date"
      entry:
        occurred_at: "When it happened"
        input: "Input"
        documents: "Documents"

  # Common labels
  labels:
    name: "Name"
    birth_date: "Birth date"
    date: "Date"
    note: "Note"
    notes: "Notes"
    created: "Created"
    updated: "Updated"

  # Common messages
  messages:
    confirm_delete: "Are you sure you want to delete this?"
    success: "Success!"
    error: "An error occurred."
    empty: "Nothing here yet."

  # Dashboard / Log
  dashboard:
    welcome:
      title: "Welcome"
      subtitle: "Select a family member to view their log"
      description: "Use the dropdown in the header to select someone, or go to Settings > Users to add family members."
      cta: "Add family members"
    new_entry:
      label: "New Entry"
      title: "Log health info for %{name}"
      subtitle: "Record when something happened and what you observed."
    entries:
      label: "Log"
      title: "Entries for %{name}"
      count: "%{count} entry"
      count_plural: "%{count} entries"
      empty: "No entries yet. Add the first health note on the left."
    protocol:
      label: "Health Protocol"
      title: "Protocol - %{name}"
      count: "%{count} entry"
      count_plural: "%{count} entries"
