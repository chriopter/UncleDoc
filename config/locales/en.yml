      delete_confirm: "Delete %{name}?"
      remove_confirm: "Remove %{name}?"
    flash:
      created: "Person added."
      destroyed: "Person removed."
      updated: "Person updated."
      update_error: "Failed to update person."

  # Settings
  settings:
    title: "Workspace settings"
    subtitle: "A simple admin area for display options and the raw database browser."
    profile:
      title: "Profile settings"
      subtitle: "UI"
    users:
      title: "Users"
      subtitle: "Family"
    db:
      title: "Full DB view"
      subtitle: "SQL"
    display:
      title: "Display preferences"
      subtitle: "Keep the first admin area simple: choose language and date format for your current view."
    language:
      label: "Language"
      title: "Choose app language"
      english: "English"
      german: "Deutsch"
    date_format:
      label: "Date format"
      title: "Choose date display"
      long: "Long"
      compact: "Compact"
    flash:
      saved: "Settings saved."

