en:
  # App name
  app:
    name: "UncleDoc"
    tagline: "Family health tracker"

  # Navigation
  nav:
    home: "Home"
    timeline: "Timeline"
    reports: "Reports"
    settings: "Settings"
    log: "Log"
    db: "DB"

  # Common actions
  actions:
    save: "Save"
    delete: "Delete"
    remove: "Remove"
    add: "Add"
    create: "Create"
    cancel: "Cancel"
    edit: "Edit"
    close: "Close"
    back: "Back"

  # ActiveRecord attribute translations
  activerecord:
    attributes:
      person:
        name: "Name"
        birth_date: "Birth date"
      entry:
        date: "Date"
        note: "Note"

  # Common labels
  labels:
    name: "Name"
    birth_date: "Birth date"
    date: "Date"
    note: "Note"
    notes: "Notes"
    created: "Created"
    updated: "Updated"

  # Common messages
  messages:
    confirm_delete: "Are you sure you want to delete this?"
