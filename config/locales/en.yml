en:
  # Date/Time formats
  date:
    formats:
      long_date: "%B %d, %Y"
      compact_date: "%m/%d/%Y"
      long: "%B %d, %Y"
      compact: "%m/%d/%Y"
  
  time:
    formats:
      default: "%H:%M"
  
  # App name
  app:
    name: "UncleDoc"
    tagline: "Family health tracker"

  # Navigation
  nav:
    home: "Home"
    timeline: "Timeline"
    reports: "Reports"
    settings: "Settings"
    log: "Log"
    db: "DB"

  # Common actions
  actions:
    save: "Save"
    delete: "Delete"
    remove: "Remove"
    add: "Add"
    create: "Create"
    cancel: "Cancel"
    edit: "Edit"
    close: "Close"
    back: "Back"

  # ActiveRecord attribute translations
  activerecord:
    attributes:
      person:
        name: "Name"
        birth_date: "Birth date"
      entry:
        occurred_at: "When it happened"
        note: "Note"

  # Common labels
  labels:
    name: "Name"
    birth_date: "Birth date"
    date: "Date"
    note: "Note"
    notes: "Notes"
    created: "Created"
    updated: "Updated"

  # Common messages
  messages:
    confirm_delete: "Are you sure you want to delete this?"
    success: "Success!"
    error: "An error occurred."
    empty: "Nothing here yet."

  # Dashboard / Log
  dashboard:
    welcome:
      title: "Welcome"
      subtitle: "Select a family member to view their log"
      description: "Use the dropdown in the header to select someone, or go to Settings > Users to add family members."
      cta: "Add family members"
    new_entry:
      label: "New Entry"
      title: "Log health info for %{name}"
      subtitle: "Record when something happened and what you observed."
    entries:
      label: "Log"
      title: "Entries for %{name}"
      count: "%{count} entry"
      count_plural: "%{count} entries"
      empty: "No entries yet. Add the first health note on the left."
    protocol:
      label: "Health Protocol"
      title: "Protocol - %{name}"
      count: "%{count} entry"
      count_plural: "%{count} entries"
      empty: "Protocol is empty"
      empty_subtitle: "Add your first entry above to start documenting health events."

  log_summary:
    label: "AI"
    title: "AI Summary"
    subtitle: "Send all saved entries for %{name} to the configured model and review the answer here."
    button: "Summarize log"
    button_short: "AI Summary"
    states:
      idle: "Press the button to send the current log to the configured LLM."
      missing_model: "Choose an LLM model in Settings before requesting a summary."
      missing_api_key: "Add an API key in Settings before requesting a summary."
      no_entries: "There are no log entries to summarize yet."
      request_failed: "The summary request failed. Check your LLM settings and try again."

  # Entries
  entries:
    form:
      placeholder: "What happened today?"
      submit: "Add entry"
      title: "Log health info for %{name}"
    data_labels:
      temperature: "Temperature"
      pulse: "Pulse"
      weight: "Weight"
      bottle_feeding: "Bottle"
      breast_feeding: "Breastfeeding"
      diaper: "Diaper"
      sleep: "Sleep"
      medication: "Medication"
    data_values:
      wet: "wet"
      solid: "solid"
      rash: "rash"
      side_left: "left"
      side_right: "right"
    destroy_confirm: "Delete this entry?"
    flash:
      created: "Entry added."
      destroyed: "Entry deleted."
    parse_status:
      pending: "Sending note to the LLM..."
      skipped: "LLM parsing is off until a model is configured in Settings."
      failed: "LLM parse failed. Keep the note and try again later."
    raw_data:
      toggle: "Show raw data"

  # People / Users / Family
  people:
    new:
      label: "New User"
      title: "Add family member"
      subtitle: "Enter name and birth date to add someone new."
    list:
      label: "Current Users"
      title: "All family members"
      count: "%{count} user"
      count_plural: "%{count} users"
      empty: "No users yet. Add your first family member on the left."
    form:
      placeholder_name: "Mila"
      label_birth_date: "Birth date"
      submit: "Save person"
      error_message: "Please fix the form."
    person:
      birth_date_label: "Birth date:"
      created_ago: "Created %{time} ago"
      delete_confirm: "Delete %{name}?"
      remove_confirm: "Remove %{name}?"
    flash:
      created: "Person added."
      destroyed: "Person removed."
      updated: "Person updated."
      update_error: "Failed to update person."

  # Settings
  settings:
    title: "Workspace settings"
    subtitle: "A simple admin area for display options and the raw database browser."
    profile:
      title: "Profile settings"
      subtitle: "UI"
    users:
      title: "Users"
      subtitle: "Family"
    db:
      title: "Full DB view"
      subtitle: "SQL"
    display:
      title: "Display preferences"
      subtitle: "Keep the first admin area simple: choose language and date format for your current view."
    language:
      label: "Language"
      title: "Choose app language"
      english: "English"
      german: "Deutsch"
    date_format:
      label: "Date format"
      title: "Choose date display"
      long: "Long"
      compact: "Compact"
    llm:
      title: "LLM"
      subtitle: "Models"
      heading: "Language model settings"
      description: "Configure the parser model UncleDoc uses for note-to-data extraction and summaries."
      provider_label: "Provider"
      provider_title: "Model provider"
      current: "Current provider: %{provider}"
      api_key_title: "API key"
      api_key_saved: "Saved in UncleDoc"
      api_key_missing: "Using env var or missing"
      api_key_placeholder: "Paste API key"
      model_title: "Model"
      model_placeholder: "Choose a model"
      model_empty: "No models loaded"
      credentials_hint: "UncleDoc falls back to `%{env_key}` if no key is saved here."
      endpoint_hint: "API base: %{endpoint}"
      save: "Save LLM settings"
      prompt_label: "Parser prompt"
      prompt_title: "Current structured-data prompt"
      prompt_description: "This is the exact system prompt UncleDoc sends before each note parse request."
      model_status:
        idle: "Choose a provider and key to load available models."
        loading: "Loading models..."
        loaded: "%{count} models loaded."
        empty: "No models returned by this provider."
        missing_key: "Add an API key before loading models."
        request_failed: "Model lookup failed. Check the provider settings and try again."
        unsupported: "%{provider} does not support automatic model lookup yet."
      providers:
        openai:
          name: "OpenAI"
        fireworks:
          name: "Fireworks"
        anthropic:
          name: "Anthropic"
        gemini:
          name: "Gemini"
        openrouter:
          name: "OpenRouter"
        ollama:
          name: "Ollama"
        xai:
          name: "xAI"
        mistral:
          name: "Mistral"
        perplexity:
          name: "Perplexity"
        deepseek:
          name: "DeepSeek"
    flash:
      saved: "Settings saved."

  # DB view
  db:
    title: "Raw database view"
    subtitle: "Admin"
    description: "This tab shows the current SQLite tables and up to 50 rows per table for fast v1 inspection."
    table:
      count: "%{count} row"
      count_plural: "%{count} rows"
      empty: "No rows yet."

  # Family/Header
  family:
    default_name: "Family"
    members_label: "UncleDoc"

  # Baby mode
  baby:
    quick_actions:
      title: "Baby quick actions"
      subtitle: "Quick buttons write structured data directly. Free text below is still available for anything else."
    feeding:
      label: "Baby"
      title: "Feeding"
      empty: "No feedings recorded yet"
      start_side: "Start %{side}"
      sides:
        left: "Left"
        right: "Right"
      timer:
        stop: "Stop and save"
        running: "Timer running since"
        started: "%{side} feeding timer started"
        stopped: "Feeding timer stopped and saved"
        missing: "No feeding timer is running"
        already_running: "Feeding timer is already running"
        duration: "%{duration} min"
        note: "Breastfeeding %{side}, %{duration} minutes"
    diaper:
      label: "Baby"
      title: "Diaper change"
      empty: "No diaper changes recorded yet"
      rash: "Rash present"
      buttons:
        wet: "Wet"
        solid: "Solid"
        both: "Both"
      notes:
        wet: "Diaper: wet"
        solid: "Diaper: solid"
        both: "Diaper: wet and solid"
      saved: "Diaper entry saved"
    bottle:
      title: "Bottle"
      button: "Save bottle"
      note: "Bottle %{amount}ml"
      badge: "%{amount} ml"
      invalid_amount: "Enter a bottle amount greater than 0 ml"
      saved: "Bottle entry saved"
    log:
      label: "Log"
      title: "Log for %{name}"
      count: "%{count} event"
      count_plural: "%{count} events"
      empty: "No baby events yet. Log the first feeding or diaper change."
    protocol:
      title: "Baby protocol"
    last_feeding: "Last feeding"
    last_diaper: "Last diaper"
    types:
      feeding: "Feeding"
      diaper: "Diaper"
    badge: "Baby mode"
    notes:
      subtitle: "Save the free-text note first. UncleDoc will parse it into badges in the background."
    off: "Off"
    toggle: "Toggle baby mode"

  # Person overview page
  person:
    overview:
      family_member: "Family Member"
      birth_date: "Born"
      years_old: "years old"
      birth_date_not_set: "Birth date not set"
      stats:
        entries: "Log Entries"
        entries_subtitle: "Health notes recorded"
        member_since: "Member Since"
        last_activity: "Last Activity"
        last_activity_short: "Last"
        no_entries: "No entries"
        start_logging: "Start logging health data"
        most_recent: "Most recent entry"
      recent_activity: "Recent Activity"
      latest_entries: "Latest Entries"
      view_log: "View Log"
      off: "Off"
